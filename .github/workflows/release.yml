name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: npm-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  changesets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test core docs
      - run: bun core/eval/run.ts --selfcheck
      - run: bun publish --dry-run --access public --tag next
      - uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bun publish --access public --tag next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
