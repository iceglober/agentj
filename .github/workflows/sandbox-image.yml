name: sandbox-image

on:
  push:
    branches: [main]
    paths:
      - core/lib/sandbox/Dockerfile
      - .github/workflows/sandbox-image.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: core/lib/sandbox
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agentj-sandbox-base:1
            ghcr.io/${{ github.repository_owner }}/agentj-sandbox-base:sha-${{ github.sha }}
