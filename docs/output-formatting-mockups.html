<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agentj — output formatting mockups</title>
<style>
  :root{
    --page:#0b0e12; --term:#12161c; --bar:#171d25; --edge:#262d38; --edge-soft:#1e242d;
    --fg:#cdd4dd; --muted:#7f8994; --faint:#49525c;
    --accent:#e08a4c; --ok:#5bb56a; --warn:#d6a340; --bad:#e0605a; --link:#6cb6ff;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--page);color:var(--fg);font-family:var(--sans);}
  .wrap{max-width:1080px;margin:0 auto;padding:18px 18px 60px;}

  /* ---- switcher ---- */
  .head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .head h1{font-size:14px;font-weight:600;margin:0;color:var(--fg);font-family:var(--mono);}
  .head h1 b{color:var(--accent);}
  .tabs{display:flex;gap:6px;}
  .tab{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--term);border:1px solid var(--edge);
       padding:6px 12px;border-radius:7px;cursor:pointer;}
  .tab.on{color:var(--page);background:var(--accent);border-color:var(--accent);font-weight:600;}
  .ctl{margin-left:auto;display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--muted);}
  .ctl .toggle{cursor:pointer;border:1px solid var(--edge);border-radius:6px;padding:5px 10px;color:var(--muted);background:var(--term);}
  .ctl .toggle.on{color:var(--accent);border-color:var(--accent);}
  .blurb{font-family:var(--mono);font-size:12px;color:var(--faint);margin:0 0 12px;line-height:1.5;}
  .blurb b{color:var(--muted);font-weight:600;}

  .screen{background:var(--term);border:1px solid var(--edge);border-radius:10px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.4);}
  .sbar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bar);border-bottom:1px solid var(--edge);
        font-family:var(--mono);font-size:12px;}
  .sbar .brand{color:var(--accent);font-weight:650;}
  .sbar .sep{color:var(--faint);} .sbar .right{margin-left:auto;color:var(--muted);}
  .sbar .adv{color:var(--accent);}
  .body{height:640px;overflow-y:auto;}
  .body::-webkit-scrollbar{width:10px;} .body::-webkit-scrollbar-thumb{background:var(--edge);border-radius:6px;}

  /* ============ MODE A — conversational cards ============ */
  .a-body{padding:18px 20px;font-family:var(--mono);font-size:13px;line-height:1.6;}
  .a-phase{display:flex;align-items:center;gap:10px;margin:20px 0 10px;color:var(--faint);font-size:11px;letter-spacing:.12em;}
  .a-phase::before,.a-phase::after{content:"";height:1px;background:var(--edge-soft);flex:1;}
  .a-card{border-radius:10px;padding:11px 14px 11px 16px;margin:10px 0;position:relative;}
  .a-card::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;}
  .a-card .who{font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;opacity:.85;}
  .a-user{background:rgba(224,138,76,.09);} .a-user::before{background:var(--accent);} .a-user .who{color:var(--accent);}
  .a-user .txt{color:#e8edf2;font-weight:600;}
  .a-asst{background:rgba(108,182,255,.06);} .a-asst::before{background:var(--link);} .a-asst .who{color:var(--link);}
  .a-asst .txt{color:#d3dae2;}
  .a-asst .li{color:#b8c1cb;padding-left:2px;}
  .a-tools{margin:8px 0;border:1px dashed var(--edge);border-radius:8px;background:rgba(255,255,255,.012);}
  .a-tools .strip{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;color:var(--muted);}
  .a-tools .strip:hover{color:var(--fg);} .a-tools .cog{color:var(--faint);}
  .a-tools .chev{margin-left:auto;color:var(--faint);}
  .a-tools .list{padding:2px 12px 9px 30px;display:none;} .a-tools.open .list{display:block;}
  .a-tline{color:#8b95a0;padding:2px 0;} .a-tline .res{color:var(--faint);}
  .a-steer{color:var(--faint);padding:5px 12px;margin:6px 0;border-left:2px solid var(--edge);font-style:italic;}
  .a-job{color:var(--ok);padding:3px 12px;font-size:12px;}

  /* ============ MODE B — timeline rail ============ */
  .b-body{padding:16px 18px 30px 0;font-family:var(--mono);font-size:12.5px;}
  .b-rail{position:relative;margin-left:120px;border-left:2px solid var(--edge);padding-left:0;}
  .b-row{position:relative;padding:3px 0 3px 22px;min-height:22px;}
  .b-row .node{position:absolute;left:-7px;top:5px;width:12px;height:12px;border-radius:50%;background:var(--term);
               border:2px solid var(--faint);}
  .b-row .stamp{position:absolute;left:-142px;top:4px;width:110px;text-align:right;color:var(--faint);font-size:11px;}
  .b-user .node{background:var(--accent);border-color:var(--accent);}
  .b-user .txt{color:#e8edf2;font-weight:600;}
  .b-asst .node{background:var(--link);border-color:var(--link);}
  .b-asst .txt{color:#d3dae2;} .b-asst .li{color:#aab3bd;display:block;padding-left:0;}
  .b-tool .node{width:8px;height:8px;left:-5px;top:7px;border-color:var(--edge);}
  .b-tool{color:#8792a0;} .b-tool .call{color:var(--muted);} .b-tool .res{color:var(--faint);}
  .b-steer .node{background:var(--warn);border-color:var(--warn);width:8px;height:8px;left:-5px;transform:rotate(45deg);border-radius:2px;}
  .b-steer{color:var(--warn);opacity:.75;font-style:italic;}
  .b-job .node{background:var(--ok);border-color:var(--ok);width:8px;height:8px;left:-5px;}
  .b-job{color:var(--ok);}
  .b-phase{position:relative;margin:14px 0 6px -22px;padding:3px 0 3px 22px;cursor:pointer;}
  .b-phase .band{display:inline-block;background:var(--bar);border:1px solid var(--edge);border-radius:20px;
                 padding:2px 12px;color:var(--muted);font-size:11px;letter-spacing:.1em;}
  .b-phase.done .band{color:var(--ok);border-color:rgba(91,181,106,.3);}
  .b-phase.cur .band{color:var(--accent);border-color:var(--accent);}
  .b-phase .hint{color:var(--faint);font-size:10px;margin-left:8px;}
  .b-collapsed{display:none;}

  /* ============ MODE C — split cockpit ============ */
  .c-body{display:flex;height:640px;}
  .c-left{flex:1;overflow-y:auto;padding:16px 18px;border-right:1px solid var(--edge);}
  .c-right{width:42%;overflow-y:auto;padding:12px 14px;background:#0e1319;font-family:var(--mono);font-size:12px;transition:width .18s;}
  .c-collapsed .c-right{width:0;padding:0;overflow:hidden;}
  .c-collapsed .c-left{border-right:none;}
  .c-lab{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
  .c-msg{border-radius:9px;padding:10px 13px;margin:9px 0;cursor:pointer;border:1px solid transparent;font-family:var(--mono);font-size:13px;line-height:1.6;}
  .c-msg:hover{border-color:var(--edge);}
  .c-msg.sel{border-color:var(--accent);}
  .c-user{background:rgba(224,138,76,.09);} .c-user .who{color:var(--accent);}
  .c-asst{background:rgba(255,255,255,.02);} .c-asst .who{color:var(--link);}
  .c-msg .who{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
  .c-user .txt{color:#e8edf2;font-weight:600;} .c-asst .txt{color:#d3dae2;} .c-asst .li{color:#b8c1cb;}
  .c-act{padding:3px 6px;border-radius:5px;color:#8792a0;}
  .c-act.hot{background:rgba(224,138,76,.12);}
  .c-act .call{color:var(--muted);} .c-act .res{color:var(--faint);}
  .c-steer{color:var(--warn);opacity:.8;font-style:italic;padding:3px 6px;}
  .c-job{color:var(--ok);padding:3px 6px;}
  .c-phase{color:var(--faint);letter-spacing:.12em;font-size:10.5px;margin:10px 0 4px;padding:0 6px;}
  .c-phase.hot{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1><b>agentj</b> · output formatting</h1>
    <div class="tabs">
      <span class="tab on" data-mode="a">A · Cards</span>
      <span class="tab" data-mode="b">B · Timeline</span>
      <span class="tab" data-mode="c">C · Cockpit</span>
    </div>
    <div class="ctl" id="ctl"></div>
  </div>
  <p class="blurb" id="blurb"></p>

  <div class="screen">
    <div class="sbar">
      <span class="brand">agentj</span><span class="sep">·</span>
      <span>austin/gen-3381-route-the-pms-config-services…</span>
      <span class="right"><span class="adv">adv</span> <span class="sep">·</span> gpt-5.4 <span class="sep">·</span> ctx 10% <span class="sep">·</span> 4m</span>
    </div>
    <div class="body" id="body"></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  // Real content, trimmed, from the GEN-3320 session.
  var E = [
    {t:'phase', name:'SCOPE'},
    {t:'user', text:'Finish GEN-3320'},
    {t:'tool', call:'bash', arg:'git branch --show-current && pwd', ms:39, res:'austin/gen-3381-…'},
    {t:'tool', call:'glob', arg:'**/AGENTS.md', ms:110, res:'AGENTS.md'},
    {t:'tool', call:'read_file', arg:'AGENTS.md', ms:0, res:'# KN MONOREPO …'},
    {t:'tool', call:'mcp_find_tools', arg:'linear get issue state', ms:0, res:'58 matches (top 12 active)'},
    {t:'tool', call:'linear__get_issue', arg:'GEN-3320', ms:567, res:'{"title":"Add a SecretsReader port…"}'},
    {t:'tool', call:'read_file', arg:'packages/core/AGENTS.md', ms:2, res:'# @kn/core — DATABASE & DOMAIN'},
    {t:'tool', call:'bash', arg:'rg SecretsManagerClient|getSecretsReader', ms:56, res:'core/package.json:120 …'},
    {t:'steer', text:'SPEAR checkpoint — 16 tool calls in and no edits yet, still in SCOPE/PLAN. Settle the design before your first edit.'},
    {t:'phase', name:'PLAN'},
    {t:'assistant', text:'Design for GEN-3320 is already locked by docs/planning/azure-migration/secrets-port.md; this branch is the child GEN-3381, so the shape is settled and well-scoped.',
      bullets:['No new abstraction beyond the landed SecretsReader / SecretsAdmin ports.',
               'PMS config services consume those ports only — no direct SecretsManagerClient call sites remain.',
               'Back-compat: secret names stay unchanged; AWS behavior stays via adapter, not call sites.',
               'I’m moving to EXECUTE now.']},
    {t:'phase', name:'EXECUTE'},
    {t:'tool', call:'read_file', arg:'pms-eaglesoft-config.router.ts', ms:0, res:'import type {…}'},
    {t:'tool', call:'read_file', arg:'pms-od-rest-config.router.ts', ms:0, res:'import { EventBridgeClient } …'},
    {t:'tool', call:'bash', arg:'git show --stat HEAD', ms:29, res:'e6cce4343 wip(core,api,GEN-3381)…'},
    {t:'assistant', text:'This branch already contains the GEN-3381 implementation in HEAD (e6cce4343). The target files are clean relative to that commit — I’m moving straight to ASSESS: verify with package tests / typecheck, then ship if green.'},
    {t:'phase', name:'ASSESS'},
    {t:'tool', call:'job_start', arg:'pnpm --filter @kn/core test', ms:3, res:'started job 1'},
    {t:'tool', call:'job_start', arg:'pnpm --filter @kn/core typecheck', ms:3, res:'started job 2'},
    {t:'tool', call:'job_start', arg:'pnpm --filter @kn/api-server test', ms:4, res:'started job 3'},
    {t:'job', text:'job 2 `@kn/core typecheck` finished — exit 0'},
    {t:'tool', call:'bash', arg:'gh pr create --draft --fill --base main', ms:2800, res:'…/pull/2860'},
    {t:'tool', call:'job_start', arg:'gh pr checks 2860 --watch', ms:1, res:'started job 4'},
    {t:'assistant', text:'Done enough to ship the existing branch state for GEN-3381 — no new edits were needed because HEAD already contained the implementation. Opened draft PR #2860; checks are watching.'},
  ];

  var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  var body=document.getElementById('body'), blurb=document.getElementById('blurb'), ctl=document.getElementById('ctl');
  var state={mode:'a', focus:false, cockpit:true, sel:null, collapsed:{}};

  var BLURBS={
    a:'<b>Cards.</b> A conversational stream — you and agentj in tinted blocks with a colored edge; runs of tool calls fold into one strip you can open; steering and job notes sit plainly between. Closest to a chat app. <i>Try:</i> click a tool strip, or toggle Focus to hide the machinery.',
    b:'<b>Timeline.</b> Everything hangs off a single rail, newest at the bottom — messages are big nodes, tool calls are ticks, steering is a diamond, phases are pills that punctuate the run. Reads like a CI / build log. <i>Try:</i> click a phase pill to collapse its section.',
    c:'<b>Cockpit.</b> Two panes: the conversation stays clean on the left (only you + agentj), all the machinery streams on the right. Click a message to spotlight the activity that produced it. <i>Try:</i> click an agentj message, or collapse the activity pane.'
  };

  // group consecutive tool events into clusters (for mode A)
  function grouped(){
    var out=[], run=null;
    E.forEach(function(e){
      if(e.t==='tool'){ if(!run){run={t:'tools',items:[]};out.push(run);} run.items.push(e); }
      else { run=null; out.push(e); }
    });
    return out;
  }
  function summarize(items){
    var counts={}; items.forEach(function(i){counts[i.call]=(counts[i.call]||0)+1;});
    return Object.keys(counts).map(function(k){return counts[k]>1?k+' ×'+counts[k]:k;}).join(', ');
  }

  /* ---------------- MODE A ---------------- */
  function renderA(){
    var h='<div class="a-body">';
    grouped().forEach(function(e,idx){
      if(e.t==='phase'){ h+='<div class="a-phase">'+e.name+'</div>'; }
      else if(e.t==='user'){ h+='<div class="a-card a-user"><div class="who">you</div><div class="txt">'+esc(e.text)+'</div></div>'; }
      else if(e.t==='assistant'){
        h+='<div class="a-card a-asst"><div class="who">agentj</div><div class="txt">'+esc(e.text)+'</div>';
        (e.bullets||[]).forEach(function(b){h+='<div class="li">• '+esc(b)+'</div>';});
        h+='</div>';
      }
      else if(e.t==='steer'){ if(!state.focus) h+='<div class="a-steer">» '+esc(e.text)+'</div>'; }
      else if(e.t==='job'){ if(!state.focus) h+='<div class="a-job">✓ '+esc(e.text)+'</div>'; }
      else if(e.t==='tools'){
        if(state.focus) return;
        var open=state.collapsed['a'+idx];
        h+='<div class="a-tools'+(open?' open':'')+'" data-cluster="a'+idx+'">'+
             '<div class="strip"><span class="cog">⚙</span> ran '+e.items.length+' tools <span style="color:var(--faint)">· '+esc(summarize(e.items))+'</span><span class="chev">'+(open?'▾':'▸')+'</span></div>'+
             '<div class="list">'+e.items.map(function(i){
               return '<div class="a-tline">· '+esc(i.call)+'('+esc(i.arg)+') <span class="res">→ '+esc(i.res)+'</span></div>';
             }).join('')+'</div></div>';
      }
    });
    h+='</div>';
    body.innerHTML=h;
    body.querySelectorAll('[data-cluster]').forEach(function(el){
      el.querySelector('.strip').addEventListener('click',function(){
        var k=el.getAttribute('data-cluster'); state.collapsed[k]=!state.collapsed[k]; renderA();
      });
    });
  }

  /* ---------------- MODE B ---------------- */
  function renderB(){
    var h='<div class="b-body"><div class="b-rail">';
    var curPhaseKey=null, order=['SCOPE','PLAN','EXECUTE','ASSESS'], seen=[];
    E.forEach(function(e,i){
      if(e.t==='phase'){
        seen.push(e.name);
        var cls = e.name==='ASSESS'?'cur':'done';
        curPhaseKey='ph'+i;
        var col=state.collapsed[curPhaseKey];
        h+='<div class="b-phase '+cls+'" data-phase="'+curPhaseKey+'"><span class="band">'+e.name+'</span><span class="hint">'+(col?'▸ show':'▾ hide')+'</span></div>';
        return;
      }
      var hidden = curPhaseKey && state.collapsed[curPhaseKey] ? ' b-collapsed' : '';
      if(e.t==='user'){ h+='<div class="b-row b-user'+hidden+'"><span class="node"></span><span class="stamp">you</span><span class="txt">'+esc(e.text)+'</span></div>'; }
      else if(e.t==='assistant'){ h+='<div class="b-row b-asst'+hidden+'"><span class="node"></span><span class="stamp">agentj</span><span class="txt">'+esc(e.text)+'</span>'+
          (e.bullets||[]).map(function(b){return '<span class="li">• '+esc(b)+'</span>';}).join('')+'</div>'; }
      else if(e.t==='tool'){ h+='<div class="b-row b-tool'+hidden+'"><span class="node"></span><span class="stamp">'+e.ms+'ms</span><span class="call">'+esc(e.call)+'</span> ('+esc(e.arg)+') <span class="res">→ '+esc(e.res)+'</span></div>'; }
      else if(e.t==='steer'){ h+='<div class="b-row b-steer'+hidden+'"><span class="node"></span><span class="stamp">steering</span>» '+esc(e.text)+'</div>'; }
      else if(e.t==='job'){ h+='<div class="b-row b-job'+hidden+'"><span class="node"></span><span class="stamp">job</span>✓ '+esc(e.text)+'</div>'; }
    });
    h+='</div></div>';
    body.innerHTML=h;
    body.querySelectorAll('[data-phase]').forEach(function(el){
      el.addEventListener('click',function(){var k=el.getAttribute('data-phase');state.collapsed[k]=!state.collapsed[k];renderB();});
    });
  }

  /* ---------------- MODE C ---------------- */
  function renderC(){
    // assign each message an id; each tool/steer/job belongs to the phase & nearest following message
    var left='<div class="c-lab">conversation</div>', right='<div class="c-lab">activity</div>';
    var msgId=0, group=0;
    // precompute: activity rows tagged with the message group they precede
    var acts=[], gid=0;
    E.forEach(function(e){
      if(e.t==='user'||e.t==='assistant'){ gid++; }
      else { acts.push({e:e, g:gid}); }
    });
    var g2=0;
    E.forEach(function(e){
      if(e.t==='user'||e.t==='assistant'){
        g2++;
        var id='m'+g2, selc=state.sel===id?' sel':'';
        var who=e.t==='user'?'you':'agentj', cls=e.t==='user'?'c-user':'c-asst';
        left+='<div class="c-msg '+cls+selc+'" data-msg="'+id+'"><div class="who">'+who+'</div><div class="txt">'+esc(e.text)+'</div>'+
              (e.bullets||[]).map(function(b){return '<div class="li">• '+esc(b)+'</div>';}).join('')+'</div>';
      }
    });
    // right pane: phases + activity, hot-highlight the selected group's rows
    var g3=0, selGroup=state.sel?parseInt(state.sel.slice(1)):null;
    E.forEach(function(e){
      if(e.t==='user'||e.t==='assistant'){ g3++; return; }
      if(e.t==='phase'){ right+='<div class="c-phase'+(e.name==='ASSESS'?' hot':'')+'">'+e.name+'</div>'; return; }
      var hot = selGroup && (g3+1)===selGroup ? ' hot':'';
      if(e.t==='tool'){ right+='<div class="c-act'+hot+'">· <span class="call">'+esc(e.call)+'</span>('+esc(e.arg)+') <span class="res">→ '+esc(e.res)+'</span></div>'; }
      else if(e.t==='steer'){ right+='<div class="c-steer'+hot+'">» '+esc(e.text)+'</div>'; }
      else if(e.t==='job'){ right+='<div class="c-job'+hot+'">✓ '+esc(e.text)+'</div>'; }
    });
    body.innerHTML='<div class="c-body'+(state.cockpit?'':' c-collapsed')+'"><div class="c-left">'+left+'</div><div class="c-right">'+right+'</div></div>';
    body.querySelectorAll('[data-msg]').forEach(function(el){
      el.addEventListener('click',function(){var id=el.getAttribute('data-msg');state.sel=state.sel===id?null:id;renderC();});
    });
  }

  function renderCtl(){
    if(state.mode==='a') ctl.innerHTML='<span class="toggle'+(state.focus?' on':'')+'" data-t="focus">Focus (hide machinery)</span>';
    else if(state.mode==='c') ctl.innerHTML='<span class="toggle'+(state.cockpit?' on':'')+'" data-t="cockpit">Activity pane</span>';
    else ctl.innerHTML='<span style="color:var(--faint)">click a phase pill to collapse</span>';
    var tog=ctl.querySelector('[data-t]');
    if(tog) tog.addEventListener('click',function(){
      var t=tog.getAttribute('data-t');
      if(t==='focus') state.focus=!state.focus;
      if(t==='cockpit') state.cockpit=!state.cockpit;
      render();
    });
  }
  function render(){
    blurb.innerHTML=BLURBS[state.mode];
    renderCtl();
    if(state.mode==='a') renderA(); else if(state.mode==='b') renderB(); else renderC();
    // start scrolled to the bottom like a live transcript
    body.scrollTop = state.mode==='c' ? 0 : body.scrollHeight;
  }

  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
      t.classList.add('on'); state.mode=t.getAttribute('data-mode'); state.sel=null; render();
    });
  });
  render();
})();
</script>
</body>
</html>
